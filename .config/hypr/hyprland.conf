# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

device {
    name = elan-touchpad
    enabled = false
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Modificador principal

### APPS PRINCIPALES ###
bind = $mainMod, Return, exec, $terminal            # Abrir Terminal
bind = $mainMod, N, exec, $editor                  # Abrir Editor (nvim)
bind = $mainMod, E, exec, $fileManager             # Abrir File Manager (ranger/lf)
bind = $mainMod, B, exec, $browser                # Abrir Browser
bind = $mainMod, Space, exec, $menu               # Launcher (Rofi)
bind = $mainMod, S, togglespecialworkspace, magic # Scratchpad terminal flotante
bind = $mainMod SHIFT, S, movetoworkspace, special:magic # Mover ventana a scratchpad
bind = $mainMod SHIFT, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit # Apagar / salir
bind = $mainMod, Q, killactive                     # Cerrar ventana activa

### MOVIMIENTO ENTRE VENTANAS (FOCO) ###
bind = $mainMod, h, movefocus, l                  # Mover foco a ventana izquierda
bind = $mainMod, j, movefocus, d                  # Mover foco a ventana abajo
bind = $mainMod, k, movefocus, u                  # Mover foco a ventana arriba
bind = $mainMod, l, movefocus, r                  # Mover foco a ventana derecha

### MOVER VENTANAS ###
bind = $mainMod SHIFT, h, movewindow, l          # Mover ventana izquierda
bind = $mainMod SHIFT, j, movewindow, d          # Mover ventana abajo
bind = $mainMod SHIFT, k, movewindow, u          # Mover ventana arriba
bind = $mainMod SHIFT, l, movewindow, r          # Mover ventana derecha

### RESIZE VENTANAS ###
bind = $mainMod CTRL, h, resizeactive, -20 0     # Reducir ancho ventana izquierda
bind = $mainMod CTRL, j, resizeactive, 0 20      # Aumentar alto ventana abajo
bind = $mainMod CTRL, k, resizeactive, 0 -20     # Reducir alto ventana arriba
bind = $mainMod CTRL, l, resizeactive, 20 0      # Aumentar ancho ventana derecha

### VENTANAS DESIGUALES / MASTER ###
bind = $mainMod, P, pseudo,                       # Toggle pseudotile (tiling din√°mico)
bind = $mainMod, J, togglesplit,                 # Toggle split dwindle (cambia orientaci√≥n)

### WORKSPACES NUM√ČRICOS ###
bind = $mainMod, 1, workspace, 1                 # Cambiar a workspace 1
bind = $mainMod, 2, workspace, 2                 # Cambiar a workspace 2
bind = $mainMod, 3, workspace, 3                 # Cambiar a workspace 3
bind = $mainMod, 4, workspace, 4                 # Cambiar a workspace 4
bind = $mainMod, 5, workspace, 5                 # Cambiar a workspace 5
bind = $mainMod, 6, workspace, 6                 # Cambiar a workspace 6
bind = $mainMod, 7, workspace, 7                 # Cambiar a workspace 7
bind = $mainMod, 8, workspace, 8                 # Cambiar a workspace 8
bind = $mainMod, 9, workspace, 9                 # Cambiar a workspace 9
bind = $mainMod, 0, workspace, 10                # Cambiar a workspace 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1    # Mover ventana a workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2    # Mover ventana a workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3    # Mover ventana a workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4    # Mover ventana a workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5    # Mover ventana a workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6    # Mover ventana a workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7    # Mover ventana a workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8    # Mover ventana a workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9    # Mover ventana a workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10   # Mover ventana a workspace 10

### WORKSPACES LINEALES (ALT + hjkl) ###
bind = $mainMod ALT, h, workspace, e-1          # Ir al workspace anterior
bind = $mainMod ALT, l, workspace, e+1          # Ir al workspace siguiente

### LAYOUT / FULLSCREEN / FLOATING ###
bind = $mainMod, F, fullscreen                   # Toggle fullscreen
bind = $mainMod, V, togglefloating               # Toggle ventana flotante

### MOUSE ###
bindm = $mainMod, mouse:272, movewindow          # SUPER + LMB ‚Üí mover ventana
bindm = $mainMod, mouse:273, resizewindow        # SUPER + RMB ‚Üí redimensionar ventana
bind = $mainMod, mouse_down, workspace, e+1      # Scroll rueda abajo ‚Üí siguiente workspace
bind = $mainMod, mouse_up, workspace, e-1        # Scroll rueda arriba ‚Üí workspace anterior

### SCREENSHOTS ###
bind = , Print, exec, hyprshot -m output --clipboard-only # Print ‚Üí captura pantalla completa
bind = SHIFT, Print, exec, hyprshot -m region --clipboard-only # Shift+Print ‚Üí captura regi√≥n

### MULTIMEDIA / AUDIO / BRILLO ###
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+ # Subir volumen
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%- # Bajar volumen
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Mute audio
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle # Mute micr√≥fono

bindel = , XF86MonBrightnessUp, exec, brightnessctl set +10% # Subir brillo
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%- && brightnessctl set 1%+ # Bajar brillo

bindl = , XF86AudioNext, exec, playerctl next       # Siguiente canci√≥n
bindl = , XF86AudioPrev, exec, playerctl previous   # Canci√≥n anterior
bindl = , XF86AudioPlay, exec, playerctl play-pause # Play/Pause
bindl = , XF86AudioPause, exec, playerctl play-pause # Play/Pause

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
